name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # كل يوم عند منتصف الليل
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Game from GitHub Contribution Graph
        uses: Platane/snk@v3
        with:
          github_user_name: youssefelmesedy
          outputs: |
            ./output/pacman-contribution-graph.svg
            ./output/pacman-contribution-graph-dark.svg

      - name: Push generated snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
